<style>
    #loading-screen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: rgba(255, 255, 255, 0.9);
        z-index: 1000;
        transition: opacity 0.5s ease-out;
    }

    #loading-screen.fade-out {
        opacity: 0;
        pointer-events: none;
    }

    #loader {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #3498db;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
</style>

<div id="viewer_container" style="width: 100%; height: {{include.height}}px; position: relative;">
    <section id="loading-screen">

        <div id="loader"></div>

    </section>
    <script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
          "imports": {
            "three": "https://unpkg.com/three@0.147.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.147.0/examples/jsm/"
          }
        }
      </script>
    <script type="module">
        const width = document.getElementById('viewer_container').clientWidth;
        const height = document.getElementById('viewer_container').clientHeight;
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let camera, scene, renderer, controls;

        init();
        animate();

        function init() {
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(width, height);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFShadowShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            renderer.outputEncoding = THREE.sRGBEncoding;
            document.getElementById('viewer_container').appendChild(renderer.domElement);

            camera = new THREE.PerspectiveCamera({{ include.fov }}, width / height, 0.05, 500);
        const camera_distance = {{ include.camera_distance }}
        camera.position.set(camera_distance, camera_distance, camera_distance);
        camera.lookAt(0, 0, 0);
        scene = new THREE.Scene();
        scene.background = null;


        // loading message
        const loadingManager = new THREE.LoadingManager(() => {

            const loadingScreen = document.getElementById('loading-screen');
            loadingScreen.classList.add('fade-out');

            // optional: remove loader from DOM via event listener
            loadingScreen.addEventListener('transitionend', onTransitionEnd);

        });

        const loader = new GLTFLoader(loadingManager);

        //lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.1);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffffff, 0.8);
        pointLight.castShadow = true;
        pointLight.shadow.mapSize.width = 2048;
        pointLight.shadow.mapSize.height = 2048;
        camera.add(pointLight);
        scene.add(camera);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 15, 10);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.top = 30;
        dirLight.shadow.camera.bottom = -30;
        dirLight.shadow.camera.left = -30;
        dirLight.shadow.camera.right = 30;
        dirLight.shadow.camera.near = 0.1;
        dirLight.shadow.camera.far = 100;
        dirLight.shadow.bias = -0.0001;
        scene.add(dirLight);

        const backLight = new THREE.DirectionalLight(0x7799ff, 0.3);
        backLight.position.set(-10, 5, -10);
        scene.add(backLight);

        // ground grid
        const gridHelper = new THREE.GridHelper(50, 50, 0x666666, 0xaaaaaa);
        gridHelper.position.y = -0.01;
        scene.add(gridHelper);

        // load model
        loader.load("{{ include.model }}", function (gltf) {
            scene.add(gltf.scene);
            animate();
        }, undefined, function (error) {

            console.error(error);

        });


        //controls
        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.autoRotateSpeed = 4;
        controls.update();

        window.addEventListener('resize', onWindowResize, false);
        }


        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        }

        function onTransitionEnd(event) {
            event.target.remove();
        }        
    </script>
</div>
